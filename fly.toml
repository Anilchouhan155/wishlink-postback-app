# Fly.io app configuration
# Run: fly launch (first time) or fly deploy (subsequent)

app = "wishlink-postback-app"

[build]

[env]
  NODE_ENV = "production"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "wishlink_data"
  destination = "/data"
