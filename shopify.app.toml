# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a6a2b24e5b02cc9542f4bfe78e5017dc"
name = "wishlink-postback-app"
application_url = "https://wishlink-postback-app.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

[access_scopes]
# read_orders is required for orders/create webhook
scopes = "read_orders"

[auth]
redirect_urls = [ "https://wishlink-postback-app.vercel.app/api/auth" ]
